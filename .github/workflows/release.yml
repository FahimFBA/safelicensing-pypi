name: Release and Publish

# Triggers when CHANGELOG.md is updated on main.
# Add a new ## [x.y.z] section, commit, push — everything else is automatic.

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write    # create tags, releases, commit version bump
      id-token: write    # PyPI Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Parse the top-most released version (skips [Unreleased]) ──────────
      - name: Extract version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 '^## \[[0-9]' CHANGELOG.md \
            | sed 's/## \[\([^]]*\)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "No released version found — nothing to do."
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # ── Skip if this version was already released ──────────────────────────
      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.version.outputs.version }} already tagged — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Sync version in all source and docs files ─────────────────────────
      - name: Update version in source and docs files
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          V="${{ steps.version.outputs.version }}"

          # Python package files
          sed -i "s/^version = .*/version = \"$V\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$V\"/" safelicensing/__init__.py

          # Docs announcement bar in docusaurus.config.ts
          sed -i "s/SafeLicensing v[0-9][0-9.]*/SafeLicensing v$V/g" website/docusaurus.config.ts

          # Hero version badge in homepage
          sed -i "s/heroBadge}>v[0-9][0-9.]*/heroBadge}>v$V/" website/src/pages/index.tsx

      - name: Commit and push version bump
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml safelicensing/__init__.py \
                  website/docusaurus.config.ts website/src/pages/index.tsx
          git diff --staged --quiet \
            || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      # ── Build the distribution ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        if: steps.tag_check.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Build package
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          pip install build
          python -m build

      # ── Publish to PyPI (Trusted Publishing — no API token needed) ─────────
      - name: Publish to PyPI
        if: steps.tag_check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      # ── Extract release notes for this version ─────────────────────────────
      - name: Extract release notes
        if: steps.tag_check.outputs.skip == 'false'
        id: notes
        run: |
          NOTES=$(awk '
            /^## \[[0-9]/{
              count++
              if (count == 2) exit
              next
            }
            count == 1 { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*---[[:space:]]*$/d' | sed '/^$/N;/^\n$/d')
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release and attach dist artifacts ────────────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: false
