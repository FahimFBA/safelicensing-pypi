<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge background -->
  <rect width="32" height="32" rx="7" fill="#0c2340"/>

  <!-- License plate outline -->
  <rect x="4" y="5" width="24" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.5"/>

  <!-- Corner bolts -->
  <circle cx="7"  cy="10.5" r="1"    fill="#38bdf8" opacity="0.7"/>
  <circle cx="25" cy="10.5" r="1"    fill="#38bdf8" opacity="0.7"/>

  <!-- Encrypted text dashes — top row -->
  <rect x="9"  y="8.5" width="6"  height="1.5" rx="0.75" fill="#38bdf8"/>
  <rect x="17" y="8.5" width="5"  height="1.5" rx="0.75" fill="#38bdf8"/>

  <!-- Encrypted text dashes — bottom row (dimmer = "encrypted") -->
  <rect x="9"  y="11.5" width="4" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.45"/>
  <rect x="15" y="11.5" width="7" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.45"/>

  <!-- Lock shackle -->
  <path d="M13 20 L13 17.5 C13 15 19 15 19 17.5 L19 20"
        fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="11" y="20" width="10" height="8" rx="2" fill="#38bdf8"/>

  <!-- Keyhole dot -->
  <circle cx="16" cy="23.5" r="1.5" fill="#0c2340"/>
  <!-- Keyhole stem -->
  <rect x="15.2" y="23.5" width="1.6" height="2.5" rx="0.5" fill="#0c2340"/>
</svg>
